<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#313bac;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- < bracket -->
  <text x="5" y="46"
    font-family="'Courier New', Courier, monospace"
    font-size="38"
    font-weight="800"
    fill="white">&lt;</text>

  <!-- / slash -->
  <text x="24" y="46"
    font-family="'Courier New', Courier, monospace"
    font-size="38"
    font-weight="800"
    fill="rgba(255,255,255,0.75)">/</text>

  <!-- > bracket -->
  <text x="41" y="46"
    font-family="'Courier New', Courier, monospace"
    font-size="38"
    font-weight="800"
    fill="white">&gt;</text>
</svg>
