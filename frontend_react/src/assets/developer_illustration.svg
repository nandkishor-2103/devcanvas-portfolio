<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" fill="none">
  <!-- Background desk surface -->
  <ellipse cx="450" cy="580" rx="320" ry="40" fill="#E8EAF6" opacity="0.5"/>

  <!-- Desk -->
  <rect x="120" y="400" width="660" height="20" rx="10" fill="#B0BEC5"/>
  <rect x="160" y="420" width="20" height="120" rx="6" fill="#90A4AE"/>
  <rect x="720" y="420" width="20" height="120" rx="6" fill="#90A4AE"/>

  <!-- Monitor stand -->
  <rect x="415" y="370" width="70" height="35" rx="5" fill="#78909C"/>
  <rect x="390" y="400" width="120" height="10" rx="5" fill="#607D8B"/>

  <!-- Monitor body -->
  <rect x="230" y="170" width="440" height="210" rx="16" fill="#263238"/>
  <rect x="244" y="183" width="412" height="186" rx="8" fill="#1A237E"/>

  <!-- Code lines on screen -->
  <rect x="270" y="205" width="80" height="10" rx="4" fill="#7C4DFF" opacity="0.9"/>
  <rect x="360" y="205" width="120" height="10" rx="4" fill="#E040FB" opacity="0.9"/>
  <rect x="295" y="225" width="150" height="10" rx="4" fill="#64FFDA" opacity="0.9"/>
  <rect x="455" y="225" width="60" height="10" rx="4" fill="#FFD740" opacity="0.9"/>
  <rect x="270" y="245" width="200" height="10" rx="4" fill="#40C4FF" opacity="0.9"/>
  <rect x="295" y="265" width="100" height="10" rx="4" fill="#69F0AE" opacity="0.9"/>
  <rect x="405" y="265" width="90" height="10" rx="4" fill="#7C4DFF" opacity="0.9"/>
  <rect x="270" y="285" width="60" height="10" rx="4" fill="#E040FB" opacity="0.9"/>
  <rect x="340" y="285" width="130" height="10" rx="4" fill="#64FFDA" opacity="0.9"/>
  <rect x="295" y="305" width="80" height="10" rx="4" fill="#FFD740" opacity="0.9"/>
  <rect x="385" y="305" width="140" height="10" rx="4" fill="#40C4FF" opacity="0.9"/>
  <rect x="270" y="325" width="180" height="10" rx="4" fill="#69F0AE" opacity="0.9"/>
  <rect x="295" y="345" width="110" height="10" rx="4" fill="#E040FB" opacity="0.9"/>
  <rect x="415" y="345" width="70" height="10" rx="4" fill="#7C4DFF" opacity="0.9"/>

  <!-- Cursor blink -->
  <rect x="490" y="345" width="8" height="14" rx="1" fill="white" opacity="0.85"/>

  <!-- Person body -->
  <!-- Torso -->
  <rect x="360" y="430" width="180" height="160" rx="30" fill="#5C6BC0"/>
  <!-- Shirt collar/neck -->
  <rect x="425" y="415" width="50" height="30" rx="10" fill="#7986CB"/>

  <!-- Head -->
  <ellipse cx="450" cy="390" rx="58" ry="62" fill="#FFCC80"/>
  <!-- Hair -->
  <ellipse cx="450" cy="340" rx="58" ry="30" fill="#4E342E"/>
  <rect x="392" y="340" width="116" height="25" rx="0" fill="#4E342E"/>
  <!-- Eyes -->
  <ellipse cx="430" cy="385" rx="8" ry="9" fill="white"/>
  <ellipse cx="470" cy="385" rx="8" ry="9" fill="white"/>
  <circle cx="432" cy="387" r="5" fill="#263238"/>
  <circle cx="472" cy="387" r="5" fill="#263238"/>
  <circle cx="434" cy="385" r="2" fill="white"/>
  <circle cx="474" cy="385" r="2" fill="white"/>
  <!-- Smile -->
  <path d="M 433 403 Q 450 415 467 403" stroke="#E65100" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Arms - typing position -->
  <!-- Left arm -->
  <path d="M 370 470 Q 310 490 280 430" stroke="#5C6BC0" stroke-width="28" stroke-linecap="round" fill="none"/>
  <!-- Left hand -->
  <ellipse cx="275" cy="422" rx="20" ry="14" fill="#FFCC80"/>

  <!-- Right arm -->
  <path d="M 530 470 Q 590 490 620 430" stroke="#5C6BC0" stroke-width="28" stroke-linecap="round" fill="none"/>
  <!-- Right hand -->
  <ellipse cx="625" cy="422" rx="20" ry="14" fill="#FFCC80"/>

  <!-- Keyboard -->
  <rect x="270" y="415" width="360" height="18" rx="6" fill="#B0BEC5"/>
  <rect x="280" y="419" width="30" height="8" rx="3" fill="#90A4AE"/>
  <rect x="316" y="419" width="30" height="8" rx="3" fill="#90A4AE"/>
  <rect x="352" y="419" width="30" height="8" rx="3" fill="#90A4AE"/>
  <rect x="388" y="419" width="30" height="8" rx="3" fill="#90A4AE"/>
  <rect x="424" y="419" width="30" height="8" rx="3" fill="#90A4AE"/>
  <rect x="460" y="419" width="30" height="8" rx="3" fill="#90A4AE"/>
  <rect x="496" y="419" width="30" height="8" rx="3" fill="#90A4AE"/>
  <rect x="532" y="419" width="50" height="8" rx="3" fill="#90A4AE"/>

  <!-- Coffee mug -->
  <rect x="710" y="370" width="44" height="50" rx="8" fill="white" stroke="#B0BEC5" stroke-width="2"/>
  <path d="M 754 385 Q 772 385 772 400 Q 772 415 754 415" stroke="#B0BEC5" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="732" cy="373" rx="18" ry="5" fill="#795548" opacity="0.7"/>
  <!-- Steam lines -->
  <path d="M 722 360 Q 718 350 722 340" stroke="#B0BEC5" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 732 358 Q 728 348 732 338" stroke="#B0BEC5" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 742 360 Q 738 350 742 340" stroke="#B0BEC5" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Plant pot -->
  <rect x="120" y="360" width="50" height="45" rx="5" fill="#A1887F"/>
  <ellipse cx="145" cy="360" rx="25" ry="8" fill="#8D6E63"/>
  <path d="M 145 350 Q 120 310 110 280" stroke="#2E7D32" stroke-width="5" fill="none" stroke-linecap="round"/>
  <ellipse cx="102" cy="272" rx="22" ry="16" fill="#388E3C" transform="rotate(-20, 102, 272)"/>
  <path d="M 145 340 Q 165 300 175 270" stroke="#2E7D32" stroke-width="5" fill="none" stroke-linecap="round"/>
  <ellipse cx="180" cy="262" rx="22" ry="16" fill="#43A047" transform="rotate(20, 180, 262)"/>
  <path d="M 145 355 Q 145 320 145 290" stroke="#388E3C" stroke-width="5" fill="none" stroke-linecap="round"/>
  <ellipse cx="145" cy="280" rx="18" ry="14" fill="#66BB6A"/>

  <!-- Floating code snippets (decorative) -->
  <g opacity="0.75" transform="translate(750, 200) rotate(8)">
    <rect width="110" height="70" rx="10" fill="#1A237E"/>
    <rect x="10" y="15" width="50" height="8" rx="3" fill="#7C4DFF"/>
    <rect x="20" y="30" width="70" height="8" rx="3" fill="#64FFDA"/>
    <rect x="20" y="45" width="55" height="8" rx="3" fill="#FFD740"/>
  </g>

  <g opacity="0.7" transform="translate(40, 180) rotate(-6)">
    <rect width="110" height="70" rx="10" fill="#1A237E"/>
    <rect x="10" y="15" width="70" height="8" rx="3" fill="#E040FB"/>
    <rect x="20" y="30" width="50" height="8" rx="3" fill="#40C4FF"/>
    <rect x="20" y="45" width="65" height="8" rx="3" fill="#69F0AE"/>
  </g>
</svg>
