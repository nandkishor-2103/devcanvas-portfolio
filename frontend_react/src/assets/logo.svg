<svg xmlns="http://www.w3.org/2000/svg" width="260" height="52" viewBox="0 0 260 52" fill="none">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#313bac;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Left bracket < -->
  <text x="2" y="38"
    font-family="'Courier New', Courier, monospace"
    font-size="34"
    font-weight="700"
    fill="#313bac">&lt;</text>

  <!-- Forward slash / -->
  <text x="24" y="38"
    font-family="'Courier New', Courier, monospace"
    font-size="34"
    font-weight="700"
    fill="url(#textGrad)">/</text>

  <!-- Right bracket > -->
  <text x="42" y="38"
    font-family="'Courier New', Courier, monospace"
    font-size="34"
    font-weight="700"
    fill="#313bac">&gt;</text>

  <!-- Separator dot -->
  <circle cx="76" cy="26" r="3" fill="#313bac" opacity="0.4"/>

  <!-- NAND - dark -->
  <text x="88" y="38"
    font-family="Poppins, Arial, sans-serif"
    font-size="26"
    font-weight="700"
    letter-spacing="1"
    fill="#2c2c54">NK</text>

  <!-- KISHOR - gradient -->
  <text x="122" y="38"
    font-family="Poppins, Arial, sans-serif"
    font-size="26"
    font-weight="700"
    letter-spacing="1"
    fill="url(#textGrad)">Dev</text>

  <!-- Underline accent -->
  <rect x="88" y="44" width="120" height="3" rx="2" fill="url(#textGrad)" opacity="0.7"/>
</svg>
